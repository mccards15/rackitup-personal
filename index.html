// SCHEDULE BUILDER — maps dates to days
// ============================================================
function getSchedule() {
  const schedule = [];
  // Mini-block: Apr 15-18 (Wed-Sat)
  MINI_DAYS.forEach(d => schedule.push({ ...d, blockId: "mini", blockLabel: "Mini-Block: Max Testing" }));

  // Block A weeks: Apr 20-26, Apr 27-May 3, May 4-10, May 11-17
  const aWeekStarts = ["2026-04-19", "2026-04-26", "2026-05-03", "2026-05-10"];
  aWeekStarts.forEach((ws, wi) => {
    const start = new Date(ws + "T12:00:00");
    BLOCK_A_DAYS.forEach(day => {
      const d = new Date(start);
      d.setDate(d.getDate() + day.dayNumber - 1);
      const dateStr = d.toISOString().split("T")[0];
      // Skip Apr 19 (Saturday before week 1 starts on Sunday Apr 20)
      if (dateStr < "2026-04-20" || dateStr > "2026-05-17") return;
      schedule.push({ ...day, id: day.id + "_w" + (wi+1), date: dateStr, blockId: PROGRAM.blocks[wi+1].id, blockLabel: "Block A: Wk " + (wi+1) });
    });
  });

  // Deload: May 18-24 — same days as Block A but with "dl_" prefix and deload flag
  const dlStart = new Date("2026-05-17T12:00:00");
  BLOCK_A_DAYS.forEach(day => {
    const d = new Date(dlStart);
    d.setDate(d.getDate() + day.dayNumber - 1);
    const dateStr = d.toISOString().split("T")[0];
    if (dateStr < "2026-05-18" || dateStr > "2026-05-24") return;
    schedule.push({ ...day, id: "dl_" + day.id, date: dateStr, blockId: "dl", blockLabel: "Deload", isDeload: true });
  });

  // Block B weeks: May 25-31, Jun 1-7, Jun 8-14
  const bWeekStarts = ["2026-05-24", "2026-05-31", "2026-06-07"];
  bWeekStarts.forEach((ws, wi) => {
    const start = new Date(ws + "T12:00:00");
    BLOCK_B_DAYS.forEach(day => {
      const d = new Date(start);
      d.setDate(d.getDate() + day.dayNumber - 1);
      const dateStr = d.toISOString().split("T")[0];
      if (dateStr < "2026-05-25" || dateStr > "2026-06-14") return;
      schedule.push({ ...day, id: day.id + "_w" + (wi+1), date: dateStr, blockId: PROGRAM.blocks[wi+6].id, blockLabel: "Block B: Wk " + (wi+1) });
    });
  });

  // Taper: Jun 15-22 — same days as Block B with taper flag
  const tpStart = new Date("2026-06-14T12:00:00");
  BLOCK_B_DAYS.forEach(day => {
    const d = new Date(tpStart);
    d.setDate(d.getDate() + day.dayNumber - 1);
    const dateStr = d.toISOString().split("T")[0];
    if (dateStr < "2026-06-15" || dateStr > "2026-06-22") return;
    schedule.push({ ...day, id: "tp_" + day.id, date: dateStr, blockId: "tp", blockLabel: "Taper", isTaper: true });
  });

  return schedule;
}

// localStorage persistence
const STORAGE_KEY = "workout-logs-v3";
function loadLogs() { try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : {}; } catch(e) { return {}; } }
function saveLogs(logs) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); } catch(e) { console.error("Save failed:", e); } }

function localDate() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function formatTime(seconds) { return Math.floor(seconds / 60) + ":" + (seconds % 60).toString().padStart(2, "0"); }

function getCurrentWeekDays() {
  const today = localDate();
  // Find which block/week we're in
  const todayEntry = FULL_SCHEDULE.find(d => d.date === today);
  if (todayEntry) {
    // Return all days with the same blockId
    return FULL_SCHEDULE.filter(d => d.blockId === todayEntry.blockId);
  }
  // If today isn't on the schedule, find the nearest upcoming block
  const future = FULL_SCHEDULE.filter(d => d.date >= today);
  if (future.length > 0) {
    return FULL_SCHEDULE.filter(d => d.blockId === future[0].blockId);
  }
  // Fallback: show the last block
  const last = FULL_SCHEDULE[FULL_SCHEDULE.length - 1];
  return FULL_SCHEDULE.filter(d => d.blockId === last.blockId);
}

function buildExerciseHistory(allLogs) {
  const history = {};
  const allEx = {};
  FULL_SCHEDULE.forEach(d => d.exercises.forEach(ex => { allEx[ex.id] = ex; }));
  Object.entries(allLogs).sort((a, b) => a[0].localeCompare(b[0])).forEach(([logKey, log]) => {
    const datePart = logKey.split("_")[0];
    if (!log.exercises) return;
    Object.entries(log.exercises).forEach(([exId, sets]) => {
      // Match on exercise base id (strip week suffix for history matching)
      const baseId = exId.replace(/_w\d+$/, "");
      if (!history[baseId]) history[baseId] = [];
      const done = Object.entries(sets).filter(([_, s]) => s && s.done).map(([idx, s]) => ({ setIndex: Number(idx), weight: s.weight ? Number(s.weight) : null, reps: s.reps ? Number(s.reps) : null, date: datePart }));
      if (done.length > 0) history[baseId].push({ date: datePart, sets: done });
    });
  });
  return history;
}

function getLastMaxWeight(h) { if (!h || !h.length) return null; const w = h[h.length-1].sets.filter(s=>s.weight!=null).map(s=>s.weight); return w.length ? Math.max(...w) : null; }
function getLastSetWeights(h) { if (!h || !h.length) return null; return h[h.length-1].sets.map(s=>s.weight); }
function getPRWeight(h) { if (!h || !h.length) return null; let m=0; h.forEach(s=>s.sets.forEach(x=>{if(x.weight>m)m=x.weight;})); return m>0?m:null; }

const HS = { fontFamily: "'Oswald', sans-serif", fontWeight: 600, letterSpacing: "0.02em", textTransform: "uppercase" };
const MS = { fontFamily: "'JetBrains Mono', monospace" };

function RestTimerOverlay({ seconds, onDone, onSkip }) {
  const endTimeRef = useRef(Date.now() + seconds * 1000);
  const [remaining, setRemaining] = useState(seconds);
  const ref = useRef(null);
  useEffect(() => {
    endTimeRef.current = Date.now() + seconds * 1000;
    const tick = () => {
      const left = Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000));
      setRemaining(left);
      if (left <= 0) { clearInterval(ref.current); try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch(e){} setTimeout(onDone,300); }
    };
    ref.current = setInterval(tick, 250);
    const onVisible = () => { if (document.visibilityState === "visible") tick(); };
    document.addEventListener("visibilitychange", onVisible);
    return () => { clearInterval(ref.current); document.removeEventListener("visibilitychange", onVisible); };
  }, [seconds]);
  const pct = ((seconds - remaining) / seconds) * 100;
  return (
    <div style={{position:"fixed",inset:0,background:T.timerBg,zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{...HS,fontSize:16,color:T.textDim,marginBottom:12}}>REST</div>
      <div style={{position:"relative",width:200,height:200,marginBottom:32}}>
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="88" fill="none" stroke={T.border} strokeWidth="6"/>
          <circle cx="100" cy="100" r="88" fill="none" stroke={T.accent} strokeWidth="6" strokeDasharray={553} strokeDashoffset={553*(1-pct/100)} strokeLinecap="round" transform="rotate(-90 100 100)" style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{...MS,fontSize:52,fontWeight:600,color:remaining<=5?T.accent:T.text}}>{formatTime(remaining)}</span>
        </div>
      </div>
      <button onClick={onSkip} style={{background:"none",border:"1px solid "+T.textMuted,color:T.textDim,padding:"10px 32px",borderRadius:8,fontSize:15,cursor:"pointer"}}>Skip</button>
    </div>
  );
}

  <div style={{display:"flex",alignItems:"center",gap:4}}>
    <button onClick={()=>onChange(String(Math.max(0,(Number(value)||0)-s)))} style={{width:28,height:36,background:T.card,border:"1px solid "+T.border,borderRadius:6,color:T.textDim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="minus" size={14}/></button>
    <input type="text" inputMode="decimal" value={value||""} placeholder={placeholder} onChange={e=>{onChange(e.target.value.replace(/[^0-9.]/g,""));}} style={{width:w,height:36,background:T.bg,border:"1px solid "+T.border,borderRadius:6,color:T.text,textAlign:"center",fontSize:16,...MS,outline:"none",padding:0}}/>
    <button onClick={()=>onChange(String((Number(value)||0)+s))} style={{width:28,height:36,background:T.card,border:"1px solid "+T.border,borderRadius:6,color:T.textDim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={14}/></button>
  </div>
);}

function RepsInput({value,onChange,target}){return(
  <div style={{display:"flex",alignItems:"center",gap:4}}>
    <button onClick={()=>onChange(String(Math.max(0,(Number(value)||0)-1)))} style={{width:28,height:36,background:T.card,border:"1px solid "+T.border,borderRadius:6,color:T.textDim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="minus" size={14}/></button>
    <input type="text" inputMode="numeric" pattern="[0-9]*" value={value||""} placeholder={String(target)} onChange={e=>{onChange(e.target.value.replace(/[^0-9]/g,""));}} style={{width:48,height:36,background:T.bg,border:"1px solid "+T.border,borderRadius:6,color:T.text,textAlign:"center",fontSize:16,...MS,outline:"none",padding:0}}/>
    <button onClick={()=>onChange(String((Number(value)||0)+1))} style={{width:28,height:36,background:T.card,border:"1px solid "+T.border,borderRadius:6,color:T.textDim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={14}/></button>
  </div>
);}

function SetRow({setIndex,exercise,logData,onUpdate,onToggleComplete,completed}){
  const isW=exercise.type==="weighted";const isBw=exercise.type==="bodyweight";const isS=exercise.type==="cardio"||exercise.type==="timed";
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid "+T.border+"40"}}>
      <div style={{...MS,fontSize:13,color:T.textMuted,width:24,textAlign:"center"}}>{setIndex+1}</div>
      {isW&&<><NumberInput value={logData?logData.weight:undefined} onChange={v=>onUpdate({...(logData||{}),weight:v})} placeholder="lbs" width={64}/><span style={{color:T.textMuted,fontSize:13}}>{MULT}</span><RepsInput value={logData?logData.reps:undefined} onChange={v=>onUpdate({...(logData||{}),reps:v})} target={exercise.reps}/></>}
      {isBw&&<RepsInput value={logData?logData.reps:undefined} onChange={v=>onUpdate({...(logData||{}),reps:v})} target={exercise.reps}/>}
      {isS&&<div style={{fontSize:14,color:T.textDim,flex:1}}>{typeof exercise.reps==="string"?exercise.reps:exercise.reps+" reps"}</div>}
      <button onClick={onToggleComplete} style={{marginLeft:"auto",width:36,height:36,borderRadius:8,border:completed?"2px solid "+T.green:"none",cursor:"pointer",background:completed?T.greenGlow:T.accent,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
        {completed?<Icon name="undo2" size={16} color={T.green}/>:<Icon name="check" size={18} color="#fff"/>}
      </button>
    </div>
  );
}

function ExerciseCard({exercise,logs,onLogUpdate,onToggleSetComplete,isGrouped,isFirstInGroup,isLastInGroup,lastMaxWeight}){
  const sc={main:T.accent,core:T.purple,conditioning:T.red};const bc=sc[exercise.section]||T.accent;
  const rl=exercise.restSeconds>=60?(exercise.restSeconds/60)+" min":exercise.restSeconds+"s";
  return(
    <div style={{background:T.card,borderRadius:isGrouped?0:12,padding:"14px 16px",borderLeft:isGrouped?"none":"3px solid "+bc,borderTop:isGrouped&&!isFirstInGroup?"1px dashed "+T.border:"none",borderTopLeftRadius:isGrouped&&isFirstInGroup?12:0,borderTopRightRadius:isGrouped&&isFirstInGroup?12:0,borderBottomLeftRadius:isGrouped&&isLastInGroup?12:0,borderBottomRightRadius:isGrouped&&isLastInGroup?12:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:600,color:T.text,lineHeight:1.3}}>{exercise.name}</div>
          <div style={{fontSize:12,color:T.textDim,marginTop:2}}>{exercise.sets+MULT+exercise.reps+" "+DOT+" "+exercise.intensity+(exercise.restSeconds>0?" "+DOT+" "+rl+" rest":"")}</div>
        </div>
        {lastMaxWeight!=null&&exercise.type==="weighted"&&<div style={{background:T.blueGlow,border:"1px solid "+T.blue+"44",borderRadius:6,padding:"3px 8px",fontSize:11,color:T.blue,fontWeight:600,...MS,whiteSpace:"nowrap",marginLeft:8}}>{"Last: "+lastMaxWeight+" lbs"}</div>}
      </div>
      {Array.from({length:exercise.sets}).map((_,i)=><SetRow key={i} setIndex={i} exercise={exercise} logData={logs?logs[i]:undefined} completed={logs&&logs[i]&&logs[i].done} onUpdate={data=>onLogUpdate(exercise.id,i,data)} onToggleComplete={()=>onToggleSetComplete(exercise.id,i)}/>)}
    </div>
  );
}

function WarmupCard({warmupKey,completedItems,onToggle}){
  const w=WARMUPS[warmupKey];if(!w)return null;
  return(
    <div style={{background:T.card,borderRadius:12,padding:"14px 16px",borderLeft:"3px solid "+T.green,marginBottom:12}}>
      <div style={{...HS,fontSize:14,color:T.green,marginBottom:10}}>{w.title}</div>
      {w.items.map((item,i)=>(
        <div key={i} onClick={()=>onToggle(i)} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",cursor:"pointer",borderBottom:i<w.items.length-1?"1px solid "+T.border+"40":"none"}}>
          <div style={{width:22,height:22,borderRadius:6,border:"2px solid "+(completedItems.includes(i)?T.green:T.textMuted),background:completedItems.includes(i)?T.greenGlow:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {completedItems.includes(i)&&<Icon name="check" size={13} color={T.green}/>}
          </div>
          <span style={{fontSize:14,color:completedItems.includes(i)?T.textMuted:T.textDim,textDecoration:completedItems.includes(i)?"line-through":"none"}}>{item}</span>
        </div>
      ))}
    </div>
  );
}

function ActiveWorkout({day,onFinish,existingLog,allLogs}){
  const exH=buildExerciseHistory(allLogs);
  const buildInit=()=>{
    const init=existingLog&&existingLog.exercises?JSON.parse(JSON.stringify(existingLog.exercises)):{};
    day.exercises.forEach(ex=>{
      const baseId=ex.id.replace(/_w\d+$/,"");
      if(ex.type==="weighted"&&!init[ex.id]){const lw=getLastSetWeights(exH[baseId]);if(lw){const s={};for(let i=0;i<ex.sets;i++){const wt=i<lw.length?lw[i]:lw[lw.length-1];s[i]={weight:wt!=null?String(wt):"",reps:"",done:false};}init[ex.id]=s;}}
    });return init;
  };
  const[logs,setLogs]=useState(buildInit);
  const[warmupDone,setWarmupDone]=useState(existingLog?(existingLog.warmupDone||[]):[]);
  const[timerActive,setTimerActive]=useState(false);
  const[timerSeconds,setTimerSeconds]=useState(60);
  const[elapsed,setElapsed]=useState(0);
  const[viewMode,setViewMode]=useState("scroll");
  const[currentExIdx,setCurrentExIdx]=useState(0);
  const startTime=useRef(existingLog?(existingLog.startedAt||Date.now()):Date.now());
  useEffect(()=>{const id=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime.current)/1000)),1000);return()=>clearInterval(id);},[]);

  const updateLog=(exId,si,data)=>{setLogs(p=>({...p,[exId]:{...p[exId],[si]:{...(p[exId]?p[exId][si]:{}), ...data}}}));};
  const toggleSet=(exId,si)=>{
    const ex=day.exercises.find(e=>e.id===exId);const done=logs[exId]&&logs[exId][si]&&logs[exId][si].done;
    if(done){setLogs(p=>({...p,[exId]:{...p[exId],[si]:{...(p[exId]?p[exId][si]:{}),done:false,completedAt:null}}}));}
    else{setLogs(p=>({...p,[exId]:{...p[exId],[si]:{...(p[exId]?p[exId][si]:{}),done:true,completedAt:Date.now()}}}));
      if(ex&&ex.group){const ge=day.exercises.filter(e=>e.group===ex.group);const last=ge[ge.length-1];if(exId===last.id&&last.restSeconds>0){setTimerSeconds(last.restSeconds);setTimerActive(true);}}
      else if(ex&&ex.restSeconds>0){setTimerSeconds(ex.restSeconds);setTimerActive(true);}
    }
  };
  const toggleWarmup=(i)=>{setWarmupDone(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]);};
  const totalSets=day.exercises.reduce((s,e)=>s+e.sets,0);
  const doneSets=Object.values(logs).reduce((s,e)=>s+Object.values(e).filter(x=>x&&x.done).length,0);
  const pct=totalSets>0?Math.round((doneSets/totalSets)*100):0;

  const buildSections=()=>{const sec=[];let cg=null;let buf=[];day.exercises.forEach(ex=>{if(ex.group&&ex.group===cg){buf.push(ex);}else if(ex.group){if(buf.length)sec.push({type:"group",group:cg,exercises:buf});cg=ex.group;buf=[ex];}else{if(buf.length){sec.push({type:"group",group:cg,exercises:buf});buf=[];cg=null;}sec.push({type:"single",exercise:ex});}});if(buf.length)sec.push({type:"group",group:cg,exercises:buf});return sec;};
  const sections=buildSections();
  const handleFinish=()=>{onFinish({dayId:day.id,exercises:logs,warmupDone,startedAt:startTime.current,finishedAt:Date.now(),elapsed});};

  const blockColor = day.isDeload ? T.blue : day.isTaper ? T.purple : T.accent;

  return(
    <div style={{fontFamily:"'Source Sans 3', sans-serif",background:T.bg,color:T.text,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:100}}>
      {timerActive&&<RestTimerOverlay seconds={timerSeconds} onDone={()=>setTimerActive(false)} onSkip={()=>setTimerActive(false)}/>}
      <div style={{position:"sticky",top:0,zIndex:50,background:T.bg,borderBottom:"1px solid "+T.border,padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            {(day.isDeload||day.isTaper)&&<div style={{fontSize:10,fontWeight:700,...HS,color:day.isDeload?T.blue:T.purple,marginBottom:2}}>{day.isDeload?"DELOAD":"TAPER"}</div>}
            <div style={{...HS,fontSize:16,color:blockColor}}>{day.label}</div>
            <div style={{fontSize:12,color:T.textDim}}>{day.date+" "+DOT+" "+day.weekday}</div>
          </div>
          <div style={{textAlign:"right"}}><div style={{...MS,fontSize:20,color:T.text}}>{formatTime(elapsed)}</div><div style={{fontSize:12,color:T.textDim}}>{pct+"% complete"}</div></div>
        </div>
        <div style={{height:3,background:T.border,borderRadius:2,marginTop:8}}><div style={{height:"100%",background:blockColor,borderRadius:2,width:pct+"%",transition:"width 0.3s ease"}}/></div>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>setViewMode("scroll")} style={{flex:1,padding:"6px 0",background:viewMode==="scroll"?T.accentGlow:"transparent",border:"1px solid "+(viewMode==="scroll"?T.accent:T.border),borderRadius:6,color:viewMode==="scroll"?T.accent:T.textDim,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Icon name="list" size={13}/> Full View</button>
          <button onClick={()=>setViewMode("single")} style={{flex:1,padding:"6px 0",background:viewMode==="single"?T.accentGlow:"transparent",border:"1px solid "+(viewMode==="single"?T.accent:T.border),borderRadius:6,color:viewMode==="single"?T.accent:T.textDim,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Icon name="eye" size={13}/> Focus View</button>
        </div>
      </div>
      <div style={{padding:"12px 16px"}}>
        {day.warmup&&<WarmupCard warmupKey={day.warmup} completedItems={warmupDone} onToggle={toggleWarmup}/>}
        {viewMode==="scroll"?(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sections.map((sec,si)=>{
              if(sec.type==="group")return(<div key={si} style={{borderLeft:"3px solid "+blockColor,borderRadius:12,overflow:"hidden"}}><div style={{background:blockColor+"22",padding:"6px 14px",fontSize:12,color:blockColor,fontWeight:600,...HS}}>{GROUP_LABELS[sec.group]||sec.group}</div>{sec.exercises.map((ex,ei)=><ExerciseCard key={ex.id} exercise={ex} logs={logs[ex.id]} onLogUpdate={updateLog} onToggleSetComplete={toggleSet} isGrouped isFirstInGroup={ei===0} isLastInGroup={ei===sec.exercises.length-1} lastMaxWeight={getLastMaxWeight(exH[ex.id.replace(/_w\d+$/,"")])}/>)}</div>);
              return <ExerciseCard key={sec.exercise.id} exercise={sec.exercise} logs={logs[sec.exercise.id]} onLogUpdate={updateLog} onToggleSetComplete={toggleSet} lastMaxWeight={getLastMaxWeight(exH[sec.exercise.id.replace(/_w\d+$/,"")])}/>;
            })}
          </div>
        ):(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <button onClick={()=>setCurrentExIdx(Math.max(0,currentExIdx-1))} disabled={currentExIdx===0} style={{width:40,height:40,borderRadius:8,background:T.card,border:"1px solid "+T.border,color:currentExIdx===0?T.textMuted:T.text,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="chevronLeft" size={20}/></button>
              <div style={{...MS,fontSize:13,color:T.textDim}}>{(currentExIdx+1)+" / "+day.exercises.length}</div>
              <button onClick={()=>setCurrentExIdx(Math.min(day.exercises.length-1,currentExIdx+1))} disabled={currentExIdx===day.exercises.length-1} style={{width:40,height:40,borderRadius:8,background:T.card,border:"1px solid "+T.border,color:currentExIdx===day.exercises.length-1?T.textMuted:T.text,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="chevronRight" size={20}/></button>
            </div>
            {day.exercises[currentExIdx]&&<ExerciseCard exercise={day.exercises[currentExIdx]} logs={logs[day.exercises[currentExIdx].id]} onLogUpdate={updateLog} onToggleSetComplete={toggleSet} lastMaxWeight={getLastMaxWeight(exH[day.exercises[currentExIdx].id.replace(/_w\d+$/,"")])}/>}
          </div>
        )}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"12px 16px",background:"linear-gradient(transparent, "+T.bg+" 30%)"}}>
          <button onClick={handleFinish} style={{width:"100%",padding:"14px 0",background:pct===100?T.green:blockColor,border:"none",borderRadius:10,color:"#fff",fontSize:16,fontWeight:600,fontFamily:"'Oswald'",letterSpacing:"0.05em",textTransform:"uppercase",cursor:"pointer"}}>{pct===100?"Complete Workout "+TICK:"Finish Workout ("+pct+"%)"}</button>
        </div>
      </div>
    </div>
  );
}

function ExerciseHistoryDetail({exerciseId,onBack,allLogs}){
  const allEx={};
  FULL_SCHEDULE.forEach(d=>d.exercises.forEach(ex=>{const baseId=ex.id.replace(/_w\d+$/,"");if(!allEx[baseId])allEx[baseId]=ex;}));
  const ex=allEx[exerciseId];
  const history=buildExerciseHistory(allLogs);const exHist=history[exerciseId]||[];const pr=getPRWeight(exHist);
  return(
    <div style={{fontFamily:"'Source Sans 3', sans-serif",background:T.bg,color:T.text,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"16px",borderBottom:"1px solid "+T.border}}>

          <button onClick={onBack} style={{background:"none",border:"none",color:T.accent,cursor:"pointer",padding:4}}><Icon name="chevronLeft" size={24}/></button>
          <div><div style={{...HS,fontSize:18,color:T.text}}>{ex?ex.name:""}</div><div style={{fontSize:12,color:T.textDim,textTransform:"capitalize"}}>{ex?(ex.muscle+" "+DOT+" "+ex.sets+MULT+ex.reps+" "+DOT+" "+ex.intensity):""}</div></div>
        </div>
      </div>
      <div style={{padding:16}}>
        {pr!=null&&<div style={{background:T.accentGlow,border:"1px solid "+T.accent+"44",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}><Icon name="trophy" size={22} color={T.accent}/><div><div style={{fontSize:12,color:T.accent,...HS}}>Personal Record</div><div style={{...MS,fontSize:22,color:T.text,fontWeight:600}}>{pr+" lbs"}</div></div></div>}
        {exHist.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:T.textDim}}><Icon name="dumbbell" size={32} color={T.textMuted} style={{marginBottom:8,opacity:0.3}}/><div style={{fontSize:15}}>No history yet. Complete a workout to see data here.</div></div>:(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[...exHist].reverse().map((session,si)=>(
              <div key={si} style={{background:T.card,borderRadius:10,padding:"12px 16px"}}>
                <div style={{fontSize:13,color:T.accent,fontWeight:600,marginBottom:8}}>{session.date}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{session.sets.map((set,setI)=>(
                  <div key={setI} style={{background:T.bg,borderRadius:6,padding:"6px 10px",border:"1px solid "+T.border,minWidth:70,textAlign:"center"}}>
                    <div style={{...MS,fontSize:14,color:T.text}}>{set.weight!=null?(set.weight+" lbs"):"BW"}</div>
                    <div style={{fontSize:11,color:T.textDim}}>{set.reps!=null?(set.reps+" reps"):DASH}</div>
                  </div>
                ))}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function MuscleGroupDetail({muscleKey,onBack,onSelectExercise,allLogs}){
  const mg=MUSCLE_GROUPS[muscleKey];const allEx=[];const seen=new Set();
  FULL_SCHEDULE.forEach(d=>d.exercises.forEach(ex=>{const baseId=ex.id.replace(/_w\d+$/,"");if(ex.muscle===muscleKey&&!seen.has(baseId)){seen.add(baseId);allEx.push({...ex,id:baseId});}}));
  const history=buildExerciseHistory(allLogs);
  return(
    <div style={{fontFamily:"'Source Sans 3', sans-serif",background:T.bg,color:T.text,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"16px",borderBottom:"1px solid "+T.border}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:T.accent,cursor:"pointer",padding:4}}><Icon name="chevronLeft" size={24}/></button>
          <div style={{...HS,fontSize:22,color:T.text}}>{mg?mg.label:""}</div>
        </div>
      </div>
      <div style={{padding:16}}>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {allEx.map(ex=>{const eh=history[ex.id]||[];const lm=getLastMaxWeight(eh);const pr=getPRWeight(eh);const s=eh.length;return(
            <div key={ex.id} onClick={()=>onSelectExercise(ex.id)} style={{background:T.card,borderRadius:10,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,border:"1px solid "+T.border}}>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:600,color:T.text}}>{ex.name}</div>
                <div style={{fontSize:12,color:T.textDim,marginTop:2}}>{ex.sets+MULT+ex.reps+" "+DOT+" "+ex.intensity}</div>
                <div style={{fontSize:12,color:T.textMuted,marginTop:2}}>{s>0?(s+" session"+(s>1?"s":"")+" logged"):"No history yet"}{lm!=null?(" "+DOT+" Last: "+lm+" lbs"):""}{pr!=null?(" "+DOT+" PR: "+pr+" lbs"):""}</div>
              </div>
              <Icon name="chevronRight" size={18} color={T.textMuted}/>
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

function HistoryScreen({allLogs,onBack}){
  const[sm,setSm]=useState(null);const[se,setSe]=useState(null);
  if(se)return <ExerciseHistoryDetail exerciseId={se} onBack={()=>setSe(null)} allLogs={allLogs}/>;
  if(sm)return <MuscleGroupDetail muscleKey={sm} onBack={()=>setSm(null)} onSelectExercise={setSe} allLogs={allLogs}/>;
  const history=buildExerciseHistory(allLogs);const ms={};
  Object.keys(MUSCLE_GROUPS).forEach(mk=>{const ex=new Set();FULL_SCHEDULE.forEach(d=>d.exercises.forEach(e=>{const baseId=e.id.replace(/_w\d+$/,"");if(e.muscle===mk)ex.add(baseId);}));const lc=[...ex].filter(id=>history[id]&&history[id].length>0).length;ms[mk]={total:ex.size,logged:lc};});
  return(
    <div style={{fontFamily:"'Source Sans 3', sans-serif",background:T.bg,color:T.text,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"16px",borderBottom:"1px solid "+T.border}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:T.accent,cursor:"pointer",padding:4}}><Icon name="chevronLeft" size={24}/></button>
          <div style={{...HS,fontSize:22,color:T.text}}>Progress</div>
        </div>
      </div>
      <div style={{padding:16}}>
        <div style={{...HS,fontSize:13,color:T.textDim,marginBottom:10}}>MUSCLE GROUPS</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.entries(MUSCLE_GROUPS).map(([key,mg])=>{const st=ms[key];return(
            <div key={key} onClick={()=>setSm(key)} style={{background:T.card,borderRadius:12,padding:"16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,border:"1px solid "+T.border}}>
              <div style={{width:44,height:44,borderRadius:10,background:mg.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{mg.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:600,color:T.text}}>{mg.label}</div>
                <div style={{fontSize:12,color:T.textDim}}>{st.total+" exercise"+(st.total!==1?"s":"")+(st.logged>0?" "+DOT+" "+st.logged+" with history":"")}</div>
              </div>
              <Icon name="chevronRight" size={18} color={T.textMuted}/>
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

function HomeScreen({onStartDay,onViewHistory,logs}){
  const today = localDate();
  const weekDays = getCurrentWeekDays();
  const blockLabel = weekDays.length > 0 ? weekDays[0].blockLabel : "";
  const blockId = weekDays.length > 0 ? weekDays[0].blockId : "";
  const block = PROGRAM.blocks.find(b => b.id === blockId);

  // Count total and completed
  const totalDays = FULL_SCHEDULE.length;
  const completedDays = Object.keys(logs).length;

  // Block-specific color
  const blockColor = blockId === "dl" ? T.blue : blockId === "tp" ? T.purple : blockId === "mini" ? T.orange : T.accent;

  return(
    <div style={{fontFamily:"'Source Sans 3', sans-serif",background:T.bg,color:T.text,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <div style={{padding:"20px 16px 16px",background:"linear-gradient(180deg, "+blockColor+"11, transparent)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}><span style={{...HS,fontSize:24,color:T.accent,letterSpacing:"0.04em"}}>RACK</span><span style={{...HS,fontSize:24,color:T.text,letterSpacing:"0.04em"}}>IT</span><span style={{...HS,fontSize:24,color:T.accent,letterSpacing:"0.04em"}}>UP</span></div>
        <div style={{...HS,fontSize:13,color:blockColor,marginBottom:2}}>CURRENT PROGRAM</div>
        <div style={{...HS,fontSize:26,color:T.text,lineHeight:1.2}}>{PROGRAM.name}</div>
        <div style={{fontSize:13,color:T.textDim,marginTop:4}}>{"Apr 15 "+DASH+" Jun 22 "+DOT+" "+blockLabel}</div>
        {block&&<div style={{display:"inline-block",marginTop:6,background:blockColor+"22",border:"1px solid "+blockColor+"44",borderRadius:6,padding:"2px 10px",fontSize:12,color:blockColor,fontWeight:600,...HS}}>{block.weekLabel}</div>}
        <div style={{display:"flex",gap:12,marginTop:14}}>
          <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px 14px",flex:1,textAlign:"center"}}><div style={{...MS,fontSize:22,color:T.text,fontWeight:600}}>{completedDays}</div><div style={{fontSize:11,color:T.textDim}}>Workouts Done</div></div>
          <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px 14px",flex:1,textAlign:"center"}}><div style={{...MS,fontSize:22,color:T.text,fontWeight:600}}>{totalDays-completedDays}</div><div style={{fontSize:11,color:T.textDim}}>Remaining</div></div>
          <button onClick={onViewHistory} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px 14px",flex:1,textAlign:"center",cursor:"pointer",color:T.text}}><Icon name="trendingUp" size={20} style={{margin:"0 auto 2px",display:"block",opacity:0.8}}/><div style={{fontSize:11,color:T.textDim}}>Progress</div></button>
        </div>
      </div>
      <div style={{padding:"8px 16px 24px"}}>
        <div style={{...HS,fontSize:13,color:T.textDim,marginBottom:10}}>THIS WEEK</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {weekDays.map(day=>{
            const isToday = day.date === today;
            const logKey = Object.keys(logs).find(k => k.startsWith(day.date) && logs[k] && logs[k].dayId === day.id);
            const done = !!logKey;
            const dayBlockColor = day.isDeload ? T.blue : day.isTaper ? T.purple : day.blockId === "mini" ? T.orange : T.accent;
            return(
              <div key={day.id} onClick={()=>onStartDay(day)} style={{background:isToday?dayBlockColor+"15":T.card,border:"1px solid "+(isToday?dayBlockColor+"66":T.border),borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,transition:"all 0.15s"}}>
                <div style={{width:42,height:42,borderRadius:10,background:done?T.greenGlow:(day.type==="outdoor"?T.green+"15":dayBlockColor+"15"),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {done?<Icon name="check" size={20} color={T.green}/>:(day.type==="outdoor"?<Icon name="sun" size={20} color={T.green}/>:(day.blockId==="mini"?<Icon name="target" size={20} color={T.orange}/>:<Icon name="dumbbell" size={20} color={dayBlockColor}/>))}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:15,fontWeight:600,color:T.text}}>{day.label}</span>
                    {isToday&&<span style={{fontSize:10,background:dayBlockColor,color:"#fff",padding:"1px 6px",borderRadius:4,fontWeight:600,...HS}}>TODAY</span>}
                  </div>
                  <div style={{fontSize:12,color:T.textDim}}>{day.weekday+", "+day.date.slice(5)+" "+DOT+" "+(day.type==="outdoor"?"Outdoor":("Gym "+DOT+" "+day.exercises.length+" exercises"))}</div>
                </div>
                <Icon name="chevronRight" size={18} color={T.textMuted}/>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[screen,setScreen]=useState("home");const[activeDay,setActiveDay]=useState(null);const[allLogs,setAllLogs]=useState(loadLogs());
  const startDay=(day)=>{setActiveDay(day);setScreen("workout");};
  const finishWorkout=(logData)=>{const key=localDate()+"_"+logData.dayId;const updated={...allLogs,[key]:logData};setAllLogs(updated);saveLogs(updated);setScreen("home");setActiveDay(null);};
  if(screen==="workout"&&activeDay)return <ActiveWorkout day={activeDay} onFinish={finishWorkout} existingLog={allLogs[localDate()+"_"+activeDay.id]} allLogs={allLogs}/>;
  if(screen==="history")return <HistoryScreen allLogs={allLogs} onBack={()=>setScreen("home")}/>;
  return <HomeScreen onStartDay={startDay} onViewHistory={()=>setScreen("history")} logs={allLogs}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
