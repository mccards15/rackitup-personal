// localStorage persistence
const STORAGE_KEY = "workout-logs-v1";
function loadLogs() { try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : {}; } catch(e) { return {}; } }
function saveLogs(logs) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); } catch(e) { console.error("Save failed:", e); } }

function getScheduledDay(dateStr) {
  const start = new Date("2026-03-25"); const d = new Date(dateStr);
  const diff = Math.floor((d - start) / 86400000);
  if (diff < 0 || diff >= 14) return null;
  return (diff % 7) + 1;
}
function getTodayStr() { return new Date().toISOString().split("T")[0]; }
function formatTime(seconds) { return Math.floor(seconds / 60) + ":" + (seconds % 60).toString().padStart(2, "0"); }

function buildExerciseHistory(allLogs) {
  const history = {}; const allEx = {};
  PHASE1.days.forEach(d => d.exercises.forEach(ex => { allEx[ex.id] = ex; }));
  Object.entries(allLogs).sort((a, b) => a[0].localeCompare(b[0])).forEach(([logKey, log]) => {
    const datePart = logKey.split("_")[0];
    if (!log.exercises) return;
    Object.entries(log.exercises).forEach(([exId, sets]) => {
      if (!allEx[exId]) return;
      if (!history[exId]) history[exId] = [];
      const done = Object.entries(sets).filter(([_, s]) => s && s.done).map(([idx, s]) => ({ setIndex: Number(idx), weight: s.weight ? Number(s.weight) : null, reps: s.reps ? Number(s.reps) : null, date: datePart }));
      if (done.length > 0) history[exId].push({ date: datePart, sets: done });
    });
  });
  return history;
}
function getLastMaxWeight(h) { if (!h || !h.length) return null; const w = h[h.length-1].sets.filter(s=>s.weight!=null).map(s=>s.weight); return w.length ? Math.max(...w) : null; }
function getLastSetWeights(h) { if (!h || !h.length) return null; return h[h.length-1].sets.map(s=>s.weight); }
function getPRWeight(h) { if (!h || !h.length) return null; let m=0; h.forEach(s=>s.sets.forEach(x=>{if(x.weight>m)m=x.weight;})); return m>0?m:null; }

const HS = { fontFamily: "'Oswald', sans-serif", fontWeight: 600, letterSpacing: "0.02em", textTransform: "uppercase" };
const MS = { fontFamily: "'JetBrains Mono', monospace" };

function RestTimerOverlay({ seconds, onDone, onSkip }) {
  const endTimeRef = useRef(Date.now() + seconds * 1000);
  const [remaining, setRemaining] = useState(seconds);
  const ref = useRef(null);
  useEffect(() => {
    endTimeRef.current = Date.now() + seconds * 1000;
    const tick = () => {
      const left = Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000));
      setRemaining(left);
      if (left <= 0) { clearInterval(ref.current); try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch(e){} setTimeout(onDone,300); }
    };
    ref.current = setInterval(tick, 250);
    const onVisible = () => { if (document.visibilityState === "visible") tick(); };
    document.addEventListener("visibilitychange", onVisible);
    return () => { clearInterval(ref.current); document.removeEventListener("visibilitychange", onVisible); };
  }, [seconds]);
  const pct = ((seconds - remaining) / seconds) * 100;
  return (
    <div style={{position:"fixed",inset:0,background:T.timerBg,zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{...HS,fontSize:16,color:T.textDim,marginBottom:12}}>REST</div>
      <div style={{position:"relative",width:200,height:200,marginBottom:32}}>
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="88" fill="none" stroke={T.border} strokeWidth="6"/>
          <circle cx="100" cy="100" r="88" fill="none" stroke={T.accent} strokeWidth="6" strokeDasharray={553} strokeDashoffset={553*(1-pct/100)} strokeLinecap="round" transform="rotate(-90 100 100)" style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{...MS,fontSize:52,fontWeight:600,color:remaining<=5?T.accent:T.text}}>{formatTime(remaining)}</span>
        </div>
      </div>
      <button onClick={onSkip} style={{background:"none",border:"1px solid "+T.textMuted,color:T.textDim,padding:"10px 32px",borderRadius:8,fontSize:15,cursor:"pointer"}}>Skip</button>
    </div>
  );
}

function NumberInput({value,onChange,placeholder,width,step}){const w=width||72;const s=step||5;return(
  <div style={{display:"flex",alignItems:"center",gap:4}}>
    <button onClick={()=>onChange(String(Math.max(0,(Number(value)||0)-s)))} style={{width:28,height:36,background:T.card,border:"1px solid "+T.border,borderRadius:6,color:T.textDim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="minus" size={14}/></button>
    <input type="text" inputMode="decimal" value={value||""} placeholder={placeholder} onChange={e=>{onChange(e.target.value.replace(/[^0-9.]/g,""));}} style={{width:w,height:36,background:T.bg,border:"1px solid "+T.border,borderRadius:6,color:T.text,textAlign:"center",fontSize:16,...MS,outline:"none",padding:0}}/>
    <button onClick={()=>onChange(String((Number(value)||0)+s))} style={{width:28,height:36,background:T.card,border:"1px solid "+T.border,borderRadius:6,color:T.textDim,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={14}/></button>
  </div>

function ActiveWorkout({day,onFinish,existingLog,allLogs}){
  const exH=buildExerciseHistory(allLogs);
  const buildInit=()=>{
    const init=existingLog&&existingLog.exercises?JSON.parse(JSON.stringify(existingLog.exercises)):{};
    day.exercises.forEach(ex=>{
      if(ex.type==="weighted"&&!init[ex.id]){const lw=getLastSetWeights(exH[ex.id]);if(lw){const s={};for(let i=0;i<ex.sets;i++){const wt=i<lw.length?lw[i]:lw[lw.length-1];s[i]={weight:wt!=null?String(wt):"",reps:"",done:false};}init[ex.id]=s;}}
    });return init;
  };
  const[logs,setLogs]=useState(buildInit);
  const[warmupDone,setWarmupDone]=useState(existingLog?(existingLog.warmupDone||[]):[]);
  const[timerActive,setTimerActive]=useState(false);
  const[timerSeconds,setTimerSeconds]=useState(60);
  const[elapsed,setElapsed]=useState(0);
  const[viewMode,setViewMode]=useState("scroll");
  const[currentExIdx,setCurrentExIdx]=useState(0);
  const startTime=useRef(existingLog?(existingLog.startedAt||Date.now()):Date.now());
  useEffect(()=>{const id=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime.current)/1000)),1000);return()=>clearInterval(id);},[]);

  const updateLog=(exId,si,data)=>{setLogs(p=>({...p,[exId]:{...p[exId],[si]:{...(p[exId]?p[exId][si]:{}), ...data}}}));};
  const toggleSet=(exId,si)=>{
    const ex=day.exercises.find(e=>e.id===exId);const done=logs[exId]&&logs[exId][si]&&logs[exId][si].done;
    if(done){setLogs(p=>({...p,[exId]:{...p[exId],[si]:{...(p[exId]?p[exId][si]:{}),done:false,completedAt:null}}}));}
    else{setLogs(p=>({...p,[exId]:{...p[exId],[si]:{...(p[exId]?p[exId][si]:{}),done:true,completedAt:Date.now()}}}));
      if(ex&&ex.group){const ge=day.exercises.filter(e=>e.group===ex.group);const last=ge[ge.length-1];if(exId===last.id&&last.restSeconds>0){setTimerSeconds(last.restSeconds);setTimerActive(true);}}
      else if(ex&&ex.restSeconds>0){setTimerSeconds(ex.restSeconds);setTimerActive(true);}
    }
  };
  const toggleWarmup=(i)=>{setWarmupDone(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]);};
  const totalSets=day.exercises.reduce((s,e)=>s+e.sets,0);
  const doneSets=Object.values(logs).reduce((s,e)=>s+Object.values(e).filter(x=>x&&x.done).length,0);
  const pct=totalSets>0?Math.round((doneSets/totalSets)*100):0;

  const buildSections=()=>{const sec=[];let cg=null;let buf=[];day.exercises.forEach(ex=>{if(ex.group&&ex.group===cg){buf.push(ex);}else if(ex.group){if(buf.length)sec.push({type:"group",group:cg,exercises:buf});cg=ex.group;buf=[ex];}else{if(buf.length){sec.push({type:"group",group:cg,exercises:buf});buf=[];cg=null;}sec.push({type:"single",exercise:ex});}});if(buf.length)sec.push({type:"group",group:cg,exercises:buf});return sec;};
  const sections=buildSections();
  const handleFinish=()=>{onFinish({dayId:day.id,exercises:logs,warmupDone,startedAt:startTime.current,finishedAt:Date.now(),elapsed});};

  return(
    <div style={{fontFamily:"'Source Sans 3', sans-serif",background:T.bg,color:T.text,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:100}}>
      {timerActive&&<RestTimerOverlay seconds={timerSeconds} onDone={()=>setTimerActive(false)} onSkip={()=>setTimerActive(false)}/>}
      <div style={{position:"sticky",top:0,zIndex:50,background:T.bg,borderBottom:"1px solid "+T.border,padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{...HS,fontSize:16,color:T.accent}}>{"Day "+day.dayNumber}</div><div style={{fontSize:14,color:T.text,fontWeight:500}}>{day.label}</div></div>
          <div style={{textAlign:"right"}}><div style={{...MS,fontSize:20,color:T.text}}>{formatTime(elapsed)}</div><div style={{fontSize:12,color:T.textDim}}>{pct+"% complete"}</div></div>
        </div>
        <div style={{height:3,background:T.border,borderRadius:2,marginTop:8}}><div style={{height:"100%",background:T.accent,borderRadius:2,width:pct+"%",transition:"width 0.3s ease"}}/></div>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>setViewMode("scroll")} style={{flex:1,padding:"6px 0",background:viewMode==="scroll"?T.accentGlow:"transparent",border:"1px solid "+(viewMode==="scroll"?T.accent:T.border),borderRadius:6,color:viewMode==="scroll"?T.accent:T.textDim,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Icon name="list" size={13}/> Full View</button>
          <button onClick={()=>setViewMode("single")} style={{flex:1,padding:"6px 0",background:viewMode==="single"?T.accentGlow:"transparent",border:"1px solid "+(viewMode==="single"?T.accent:T.border),borderRadius:6,color:viewMode==="single"?T.accent:T.textDim,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Icon name="eye" size={13}/> Focus View</button>
        </div>
      </div>
      <div style={{padding:"12px 16px"}}>
        {day.warmup&&<WarmupCard warmupKey={day.warmup} completedItems={warmupDone} onToggle={toggleWarmup}/>}
        {viewMode==="scroll"?(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sections.map((sec,si)=>{
              if(sec.type==="group")return(<div key={si} style={{borderLeft:"3px solid "+T.accent,borderRadius:12,overflow:"hidden"}}><div style={{background:T.accentGlow,padding:"6px 14px",fontSize:12,color:T.accent,fontWeight:600,...HS}}>{GROUP_LABELS[sec.group]||sec.group}</div>{sec.exercises.map((ex,ei)=><ExerciseCard key={ex.id} exercise={ex} logs={logs[ex.id]} onLogUpdate={updateLog} onToggleSetComplete={toggleSet} isGrouped isFirstInGroup={ei===0} isLastInGroup={ei===sec.exercises.length-1} lastMaxWeight={getLastMaxWeight(exH[ex.id])}/>)}</div>);
              return <ExerciseCard key={sec.exercise.id} exercise={sec.exercise} logs={logs[sec.exercise.id]} onLogUpdate={updateLog} onToggleSetComplete={toggleSet} lastMaxWeight={getLastMaxWeight(exH[sec.exercise.id])}/>;
            })}
          </div>
        ):(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <button onClick={()=>setCurrentExIdx(Math.max(0,currentExIdx-1))} disabled={currentExIdx===0} style={{width:40,height:40,borderRadius:8,background:T.card,border:"1px solid "+T.border,color:currentExIdx===0?T.textMuted:T.text,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="chevronLeft" size={20}/></button>
              <div style={{...MS,fontSize:13,color:T.textDim}}>{(currentExIdx+1)+" / "+day.exercises.length}</div>
              <button onClick={()=>setCurrentExIdx(Math.min(day.exercises.length-1,currentExIdx+1))} disabled={currentExIdx===day.exercises.length-1} style={{width:40,height:40,borderRadius:8,background:T.card,border:"1px solid "+T.border,color:currentExIdx===day.exercises.length-1?T.textMuted:T.text,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="chevronRight" size={20}/></button>
            </div>
            {day.exercises[currentExIdx]&&<ExerciseCard exercise={day.exercises[currentExIdx]} logs={logs[day.exercises[currentExIdx].id]} onLogUpdate={updateLog} onToggleSetComplete={toggleSet} lastMaxWeight={getLastMaxWeight(exH[day.exercises[currentExIdx].id])}/>}
          </div>
        )}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"12px 16px",background:"linear-gradient(transparent, "+T.bg+" 30%)"}}>
          <button onClick={handleFinish} style={{width:"100%",padding:"14px 0",background:pct===100?T.green:T.accent,border:"none",borderRadius:10,color:"#fff",fontSize:16,fontWeight:600,fontFamily:"'Oswald'",letterSpacing:"0.05em",textTransform:"uppercase",cursor:"pointer"}}>{pct===100?"Complete Workout "+TICK:"Finish Workout ("+pct+"%)"}</button>
        </div>
      </div>
    </div>
  );
}

          <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px 14px",flex:1,textAlign:"center"}}><div style={{...MS,fontSize:22,color:T.text,fontWeight:600}}>{ck.length}</div><div style={{fontSize:11,color:T.textDim}}>Workouts Done</div></div>
          <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px 14px",flex:1,textAlign:"center"}}><div style={{...MS,fontSize:22,color:T.text,fontWeight:600}}>{14-ck.length}</div><div style={{fontSize:11,color:T.textDim}}>Remaining</div></div>
          <button onClick={onViewHistory} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px 14px",flex:1,textAlign:"center",cursor:"pointer",color:T.text}}><Icon name="trendingUp" size={20} style={{margin:"0 auto 2px",display:"block",opacity:0.8}}/><div style={{fontSize:11,color:T.textDim}}>Progress</div></button>
        </div>
      </div>
      <div style={{padding:"8px 16px 24px"}}>
        <div style={{...HS,fontSize:13,color:T.textDim,marginBottom:10}}>THIS WEEK</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {PHASE1.days.map(day=>{
            const isToday=day.dayNumber===todayDayNum;const wo=(cw-1)*7;const dd=new Date(start);dd.setDate(dd.getDate()+wo+day.dayNumber-1);const ds=dd.toISOString().split("T")[0];
            const lk=ck.find(k=>k.startsWith(ds)&&logs[k]&&logs[k].dayId===day.id);const done=!!lk;
            return(
              <div key={day.id} onClick={()=>onStartDay(day)} style={{background:isToday?T.accentGlow:T.card,border:"1px solid "+(isToday?T.accent+"66":T.border),borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,transition:"all 0.15s"}}>
                <div style={{width:42,height:42,borderRadius:10,background:done?T.greenGlow:(day.type==="outdoor"?T.green+"15":T.accent+"15"),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {done?<Icon name="check" size={20} color={T.green}/>:(day.type==="outdoor"?<Icon name="sun" size={20} color={T.green}/>:<Icon name="dumbbell" size={20} color={T.accent}/>)}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:15,fontWeight:600,color:T.text}}>{day.label}</span>
                    {isToday&&<span style={{fontSize:10,background:T.accent,color:"#fff",padding:"1px 6px",borderRadius:4,fontWeight:600,...HS}}>TODAY</span>}
                  </div>
                  <div style={{fontSize:12,color:T.textDim}}>{day.weekday+" "+DOT+" Day "+day.dayNumber+" "+DOT+" "+(day.type==="outdoor"?"Outdoor":("Gym "+DOT+" "+day.exercises.length+" exercises"))}</div>
                </div>
                <Icon name="chevronRight" size={18} color={T.textMuted}/>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[screen,setScreen]=useState("home");const[activeDay,setActiveDay]=useState(null);const[allLogs,setAllLogs]=useState(loadLogs());
  const startDay=(day)=>{setActiveDay(day);setScreen("workout");};
  const finishWorkout=(logData)=>{const key=getTodayStr()+"_"+logData.dayId;const updated={...allLogs,[key]:logData};setAllLogs(updated);saveLogs(updated);setScreen("home");setActiveDay(null);};
  if(screen==="workout"&&activeDay)return <ActiveWorkout day={activeDay} onFinish={finishWorkout} existingLog={allLogs[getTodayStr()+"_"+activeDay.id]} allLogs={allLogs}/>;
  if(screen==="history")return <HistoryScreen allLogs={allLogs} onBack={()=>setScreen("home")}/>;
  return <HomeScreen onStartDay={startDay} onViewHistory={()=>setScreen("history")} logs={allLogs}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
